name: eval-gate

on:
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt pytest
      - name: Gate logic unit tests (no API key needed)
        run: pytest tests/ -v

  eval-gate:
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt

      - name: Run evaluation (judge + candidate on Groq)
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: python -m evaluator.runner data/sample_testcases.csv --limit 3

      - name: Gate on pass rate (>=90%, zero safety failures)
        run: python -m evaluator.gate --threshold 0.9 --strict-safety

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: results/
